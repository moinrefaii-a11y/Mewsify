name: melody
description: A YouTube-powered music streamer with background playback, downloads, and offline support.
publish_to: 'none'
version: 0.7.0+16

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.1.4

  # Audio playback + background service
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  rxdart: ^0.27.7

  # YouTube extraction (InnerTube client, Dart port of youtube-dl)
  # Pinned to 3.x for the PO-token-aware extractor.
  youtube_explode_dart: ^3.1.0

  # WebView (used for the Browse-YouTube tab only)
  flutter_inappwebview: ^6.1.5

  # Native video player for the Now Playing "video mode".
  # We stream YouTube's video-only adaptive streams (no ads baked in)
  # muted, and lock the audio timeline against just_audio so the two
  # stay perfectly in sync — Demus / YMusic pattern.
  video_player: ^2.9.5

  # Permissions (overlay window on Android)
  permission_handler: ^11.3.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP for InnerTube calls + GitHub update checks
  http: ^1.2.1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0

  # Deep link / URL handling (Spotify-style "open in MewSify" links)
  app_links: ^6.3.2

  # Voice search (mic button → speech-to-text)
  speech_to_text: ^7.0.0



  # Image caching
  cached_network_image: ^3.3.1

  # Album art color extraction (Spotify-style player gradient)
  palette_generator: ^0.3.3+5

  # Floating popup overlay (Android only)
  flutter_overlay_window: ^0.4.5

  # Utilities
  share_plus: ^12.0.2

  # Native splash (runtime API used in main.dart to hold/release splash)
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0F0F10"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 23

# Native splash: dark background + centered MewSify mark.
# Android 12+ uses an icon-only splash centered on the system color;
# pre-12 and iOS use the full splash image.
flutter_native_splash:
  color: "#0F0F10"
  image: assets/images/app_icon_foreground.png
  android_12:
    image: assets/images/app_icon_foreground.png
    color: "#0F0F10"
    icon_background_color: "#0F0F10"
  ios: true
  android: true
  fullscreen: false
